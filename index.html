<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéDev · A Modern Pokédex</title>
    <meta name="description" content="PokéDev — a Pokédex built with React, Mantine, Vite, and PokéAPI." />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 4 50 A 46 46 0 0 1 96 50 Z' fill='%23ee5253'/><path d='M 4 50 A 46 46 0 0 0 96 50 Z' fill='%23f4f7fb'/><circle cx='50' cy='50' r='46' fill='none' stroke='%232f3447' stroke-width='7'/><line x1='4' y1='50' x2='96' y2='50' stroke='%232f3447' stroke-width='7'/><circle cx='50' cy='50' r='14' fill='%23f4f7fb' stroke='%232f3447' stroke-width='7'/><circle cx='50' cy='50' r='5.5' fill='%232f3447'/></svg>" />
    <script>
      // Prevent color-scheme flash: resolve Mantine's stored scheme before paint.
      (function () {
        try {
          var stored = localStorage.getItem('mantine-color-scheme-value');
          var scheme =
            !stored || stored === 'auto'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : stored;
          document.documentElement.setAttribute('data-mantine-color-scheme', scheme);
        } catch (e) {
          document.documentElement.setAttribute('data-mantine-color-scheme', 'light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://pokeapi.co" />
    <link rel="preconnect" href="https://raw.githubusercontent.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
